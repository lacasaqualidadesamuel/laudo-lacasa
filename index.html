<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Laudo de Qualidade — La Casa Di Pão</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --blue:#1B3A6B;--blue-light:#E8EEF7;--green:#1A7A3A;--green-light:#E8F5EC;
  --gray:#666;--gray-light:#F5F5F5;--border:#DDDDDD;--red:#C0392B;--white:#fff;
  --font:'Segoe UI',system-ui,sans-serif
}
body{font-family:var(--font);background:#F0F2F5;color:#222;font-size:15px;padding-bottom:80px}
header{background:var(--blue);color:#fff;padding:12px 16px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:100}
header img{width:44px;height:44px;border-radius:8px;background:#fff;object-fit:contain;flex-shrink:0}
header h1{font-size:15px;font-weight:600;line-height:1.3}
header p{font-size:12px;opacity:.75;margin-top:2px}
.card{background:#fff;border-radius:12px;margin:12px;padding:16px;border:1px solid var(--border)}
.card h2{font-size:13px;font-weight:600;color:var(--blue);text-transform:uppercase;letter-spacing:.5px;margin-bottom:14px;padding-bottom:8px;border-bottom:2px solid var(--blue-light)}
label{display:block;font-size:13px;font-weight:600;color:#444;margin-bottom:4px;margin-top:12px}
label:first-of-type{margin-top:0}
select,input[type=text],input[type=date]{width:100%;padding:10px 12px;border:1px solid var(--border);border-radius:8px;font-size:15px;background:#fff;color:#222;-webkit-appearance:none;appearance:none}
select:focus,input:focus{outline:2px solid var(--blue);border-color:var(--blue)}
/* LOTE GROUP */
.lote-group{background:var(--gray-light);border-radius:10px;padding:12px;margin-bottom:8px;border:1px solid var(--border)}
.lote-group-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.lote-group-header h3{font-size:13px;font-weight:600;color:var(--blue)}
.lote-group-header button{background:none;border:none;color:var(--red);font-size:18px;cursor:pointer;padding:2px 6px;line-height:1;touch-action:manipulation}
.tipo-lote{display:flex;gap:8px;margin-bottom:10px}
.tipo-btn{flex:1;padding:7px;border:1px solid var(--border);border-radius:8px;background:#fff;font-size:13px;cursor:pointer;text-align:center;color:#555;touch-action:manipulation}
.tipo-btn.ativo{background:var(--blue);color:#fff;border-color:var(--blue);font-weight:600}
.lote-inputs{display:grid;gap:8px}
.lote-inputs.intervalo{grid-template-columns:1fr 1fr}
.lote-prefix{display:flex;align-items:center;gap:6px}
.lote-prefix span{background:var(--blue);color:#fff;padding:8px;border-radius:8px;font-size:13px;font-weight:700;white-space:nowrap}
.lote-prefix input{flex:1}
/* BOTÃO ADICIONAR — pequeno, esquerda */
.btn-add{display:inline-flex;align-items:center;gap:6px;padding:8px 14px;border:1.5px dashed var(--blue);border-radius:8px;background:transparent;color:var(--blue);font-size:13px;font-weight:600;cursor:pointer;margin-top:8px;touch-action:manipulation}
.btn-add:active{background:var(--blue-light)}
.btn-add svg{width:16px;height:16px;flex-shrink:0}
/* MASSAS */
.massa-card{background:#fff;border:1px solid var(--border);border-radius:10px;margin:0 12px 10px;overflow:hidden}
.massa-header{background:var(--blue);color:#fff;padding:10px 14px;font-size:13px;font-weight:600;display:flex;align-items:center;justify-content:space-between}
.massa-body{padding:14px}
.qc-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:12px}
.qc-item label{font-size:11px;color:var(--gray);margin-bottom:4px;text-align:center;display:block;margin-top:0}
.qc-item input[type=number]{width:100%;padding:8px 4px;border:1px solid var(--border);border-radius:8px;font-size:18px;font-weight:700;text-align:center;color:var(--blue)}
.total-badge{background:var(--blue-light);border:1px solid var(--blue);border-radius:8px;padding:8px 12px;display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.total-badge .tl{font-size:12px;color:var(--blue);font-weight:600}
.total-badge .tv{font-size:18px;font-weight:700;color:var(--blue)}
.status-ok{background:var(--green-light);color:var(--green);border:1px solid var(--green);border-radius:8px;padding:7px 12px;font-size:13px;font-weight:700;text-align:center;margin-bottom:10px}
/* FOTOS */
.fotos-section{background:#fff;border-radius:12px;margin:12px;padding:16px;border:1px solid var(--border)}
.fotos-section h2{font-size:13px;font-weight:600;color:var(--blue);text-transform:uppercase;letter-spacing:.5px;margin-bottom:14px;padding-bottom:8px;border-bottom:2px solid var(--blue-light)}
.foto-card{background:var(--gray-light);border-radius:10px;padding:12px;margin-bottom:10px;border:1px solid var(--border)}
.foto-card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.foto-card-header span{font-size:13px;font-weight:700;color:var(--blue)}
.foto-card-header button{background:none;border:none;color:var(--red);font-size:18px;cursor:pointer;padding:2px 6px;touch-action:manipulation}
.lotes-seletor{margin-bottom:10px}
.lotes-seletor p{font-size:12px;color:var(--gray);margin-bottom:6px;font-weight:600}
.lotes-chips{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px}
.chip{padding:5px 10px;border-radius:20px;font-size:12px;font-weight:600;border:1.5px solid var(--border);background:#fff;cursor:pointer;touch-action:manipulation;color:#555}
.chip.sel{background:var(--blue);color:#fff;border-color:var(--blue)}
.lotes-selecionados{font-size:11px;color:var(--blue);font-style:italic;min-height:16px;margin-bottom:8px;word-break:break-all}
.foto-area{border:2px dashed var(--border);border-radius:8px;padding:14px;text-align:center;cursor:pointer;background:#fff;position:relative}
.foto-area input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.foto-area.tem-foto{border-color:var(--green);background:var(--green-light)}
.foto-area .fi{font-size:24px}
.foto-area p{font-size:12px;color:var(--gray);margin-top:4px}
.foto-preview{width:100%;border-radius:6px;margin-top:8px;display:none;max-height:160px;object-fit:cover}
/* RESUMO */
.resumo-bar{background:var(--blue-light);border:1px solid var(--blue);border-radius:10px;margin:0 12px 4px;padding:10px 14px;display:flex;justify-content:space-between;align-items:center}
.resumo-bar span{font-size:13px;color:var(--blue);font-weight:600}
/* BTN GERAR */
.btn-gerar{position:fixed;bottom:0;left:0;right:0;background:var(--blue);color:#fff;border:none;padding:16px;font-size:16px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;z-index:200;touch-action:manipulation}
.btn-gerar svg{width:20px;height:20px}
/* MODAL */
.modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:300;align-items:center;justify-content:center;padding:20px}
.modal.open{display:flex}
.modal-box{background:#fff;border-radius:16px;padding:24px;width:100%;max-width:340px;text-align:center}
.modal-box h3{font-size:18px;font-weight:700;color:var(--blue);margin-bottom:8px}
.modal-box p{font-size:14px;color:var(--gray);margin-bottom:20px}
.modal-btns{display:flex;flex-direction:column;gap:10px}
.btn-wpp{background:#25D366;color:#fff;border:none;border-radius:10px;padding:14px;font-size:15px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px}
.btn-dl{background:var(--blue);color:#fff;border:none;border-radius:10px;padding:14px;font-size:15px;font-weight:700;cursor:pointer}
.btn-fc{background:none;border:1px solid var(--border);border-radius:10px;padding:12px;font-size:14px;color:var(--gray);cursor:pointer}
</style>
</head>

function getSfx(){
  var d=new Date(), dd=String(d.getDate()).padStart(2,'0'), mm=String(d.getMonth()+1).padStart(2,'0');
  return '-M-'+dd+mm;
}

window.adicionarLote=function(){
  loteCount++;
  var id='lg'+loteCount;
  var cod=document.getElementById('produto').value||'XX';
  var sfx=getSfx();
  var div=document.createElement('div');
  div.className='lote-group'; div.id=id;
  div.innerHTML='<div class="lote-group-header"><h3>Grupo '+loteCount+'</h3>'
    +'<button type="button" onclick="removerLote(\''+id+'\')">×</button></div>'
    +'<div class="tipo-lote">'
    +'<button class="tipo-btn ativo" type="button" onclick="setTipo(\''+id+'\',\'avulso\',this)">Lote avulso</button>'
    +'<button class="tipo-btn" type="button" onclick="setTipo(\''+id+'\',\'intervalo\',this)">Intervalo</button>'
    +'</div>'
    +'<div class="lote-inputs" id="inp'+id+'" data-tipo="avulso">'
    +'<div class="lote-prefix"><span>'+cod+'-</span>'
    +'<input type="text" placeholder="001" maxlength="3" id="s1'+id+'" oninput="atualizarMassas()" style="text-align:center;font-weight:700">'
    +'<span>'+sfx+'</span></div></div>';
  document.getElementById('lotes-container').appendChild(div);
  atualizarMassas();
};

window.setTipo=function(id,tipo,btn){
  document.querySelectorAll('#'+id+' .tipo-btn').forEach(function(b){b.classList.remove('ativo');});
  btn.classList.add('ativo');
  var cod=document.getElementById('produto').value||'XX';
  var sfx=getSfx();
  var cont=document.getElementById('inp'+id);
  cont.dataset.tipo=tipo;
  if(tipo==='avulso'){
    cont.className='lote-inputs';
    cont.innerHTML='<div class="lote-prefix"><span>'+cod+'-</span>'
      +'<input type="text" placeholder="001" maxlength="3" id="s1'+id+'" oninput="atualizarMassas()" style="text-align:center;font-weight:700">'
      +'<span>'+sfx+'</span></div>';
  } else {
    cont.className='lote-inputs intervalo';
    cont.innerHTML='<div><label style="font-size:11px;margin-top:0">De</label>'
      +'<div class="lote-prefix"><span>'+cod+'-</span>'
      +'<input type="text" placeholder="001" maxlength="3" id="s1'+id+'" oninput="atualizarMassas()" style="text-align:center;font-weight:700"></div></div>'
      +'<div><label style="font-size:11px;margin-top:0">Até</label>'
      +'<div class="lote-prefix"><span>'+cod+'-</span>'
      +'<input type="text" placeholder="010" maxlength="3" id="s2'+id+'" oninput="atualizarMassas()" style="text-align:center;font-weight:700"></div></div>';
  }
  atualizarMassas();
};

window.removerLote=function(id){
  // Remove massas vinculadas
  var lotesDoGrupo=getLotesDoGrupo(id);
  lotesDoGrupo.forEach(function(l){
    var el=document.getElementById('mc'+l);
    if(el) el.remove();
    delete massasData[l];
  });
  document.getElementById(id).remove();
  atualizarMassas();
  atualizarChipsFotos();
};

function getLotesDoGrupo(id){
  var lotes=[];
  var cod=document.getElementById('produto').value||'XX';
  var sfx=getSfx();
  var cont=document.getElementById('inp'+id);
  if(!cont) return lotes;
  var tipo=cont.dataset.tipo;
  var s1=document.getElementById('s1'+id);
  var s2=document.getElementById('s2'+id);
  if(!s1||!s1.value.trim()) return lotes;
  if(tipo==='avulso'){
    lotes.push(cod+'-'+s1.value.padStart(3,'0')+sfx);
  } else {
    if(!s2||!s2.value.trim()) return lotes;
    var de=parseInt(s1.value), ate=parseInt(s2.value);
    if(isNaN(de)||isNaN(ate)||ate<de) return lotes;
    for(var i=de;i<=ate;i++) lotes.push(cod+'-'+String(i).padStart(3,'0')+sfx);
  }
  return lotes;
}

function getLotes(){
  var lotes=[];
  document.querySelectorAll('.lote-group').forEach(function(g){
    getLotesDoGrupo(g.id).forEach(function(l){ if(!lotes.includes(l)) lotes.push(l); });
  });
  return lotes;
}

window.atualizarMassas=function(){
  var lotes=getLotes();
  var sec=document.getElementById('massas-section');
  var fSec=document.getElementById('fotos-section');
  if(lotes.length===0){sec.style.display='none';fSec.style.display='none';return;}
  sec.style.display='block'; fSec.style.display='block';
  var cont=document.getElementById('massas-container');
  // Adicionar novas massas
  lotes.forEach(function(lote){
    if(!massasData[lote]) massasData[lote]={v:0,c:0,p:0};
    if(!document.getElementById('mc'+lote)){
      var div=document.createElement('div');
      div.className='massa-card'; div.id='mc'+lote;
      div.innerHTML='<div class="massa-header"><span>'+lote+'</span>'
        +'<span id="badge'+lote+'" style="font-size:12px;opacity:.8">—</span></div>'
        +'<div class="massa-body">'
        +'<div class="qc-grid">'
        +'<div class="qc-item"><label>Volume</label><input type="number" min="0" max="100" step="5" placeholder="0" id="v'+lote+'" oninput="calcTotal(\''+lote+'\')"></div>'
        +'<div class="qc-item"><label>Crocância</label><input type="number" min="0" max="100" step="5" placeholder="0" id="c'+lote+'" oninput="calcTotal(\''+lote+'\')"></div>'
        +'<div class="qc-item"><label>Pestana</label><input type="number" min="0" max="100" step="5" placeholder="0" id="p'+lote+'" oninput="calcTotal(\''+lote+'\')"></div>'
        +'</div>'
        +'<div class="total-badge"><span class="tl">Total</span><span class="tv" id="tot'+lote+'">—</span></div>'
        +'<div class="status-ok">✔ Aprovado</div>'
        +'</div>';
      cont.appendChild(div);
    }
  });
  // Remover massas que saíram
  Object.keys(massasData).forEach(function(lote){
    if(!lotes.includes(lote)){
      var el=document.getElementById('mc'+lote);
      if(el) el.remove();
      delete massasData[lote];
    }
  });
  document.getElementById('resumo-texto').textContent=lotes.length+' massa'+(lotes.length!==1?'s':'');
  atualizarChipsFotos();
};

window.calcTotal=function(lote){
  var v=parseInt(document.getElementById('v'+lote).value)||0;
  var c=parseInt(document.getElementById('c'+lote).value)||0;
  var p=parseInt(document.getElementById('p'+lote).value)||0;
  var t=v+c+p;
  massasData[lote]={v:v,c:c,p:p};
  var totEl=document.getElementById('tot'+lote);
  var badgeEl=document.getElementById('badge'+lote);
  if(v>0||c>0||p>0){
    totEl.textContent=t+' pts';
    badgeEl.textContent='✔ '+t+' pts';
  } else {
    totEl.textContent='—';
    badgeEl.textContent='—';
  }
};

// ── FOTOS ──────────────────────────────────────────────────────────────────
window.adicionarFoto=function(){
  fotoCount++;
  var fid='foto'+fotoCount;
  fotosData[fid]={lotesSel:[],base64:null};
  var div=document.createElement('div');
  div.className='foto-card'; div.id=fid;
  div.innerHTML='<div class="foto-card-header">'
    +'<span>📷 Foto '+fotoCount+'</span>'
    +'<button type="button" onclick="removerFoto(\''+fid+'\')">×</button>'
    +'</div>'
    +'<div class="lotes-seletor">'
    +'<p>Massas nesta foto (toque para selecionar):</p>'
    +'<div class="lotes-chips" id="chips'+fid+'"></div>'
    +'<div class="lotes-selecionados" id="sel'+fid+'">Nenhuma massa selecionada</div>'
    +'</div>'
    +'<div class="foto-area" id="fa'+fid+'">'
    +'<input type="file" accept="image/*" capture="environment" onchange="carregarFoto(this,\''+fid+'\')">'
    +'<div class="fi">📷</div>'
    +'<p>Toque para tirar ou escolher a foto</p>'
    +'<img id="fimg'+fid+'" class="foto-preview">'
    +'</div>';
  document.getElementById('fotos-container').appendChild(div);
  renderizarChips(fid);
  atualizarResumoFotos();
};

window.removerFoto=function(fid){
  document.getElementById(fid).remove();
  delete fotosData[fid];
  atualizarResumoFotos();
};

function atualizarChipsFotos(){
  document.querySelectorAll('.foto-card').forEach(function(fc){
    renderizarChips(fc.id);
  });
}

function renderizarChips(fid){
  var cont=document.getElementById('chips'+fid);
  if(!cont) return;
  var lotes=getLotes();
  var sel=fotosData[fid]?fotosData[fid].lotesSel:[];
  // Remove lotes selecionados que já não existem
  sel=sel.filter(function(l){return lotes.includes(l);});
  if(fotosData[fid]) fotosData[fid].lotesSel=sel;
  cont.innerHTML='';
  lotes.forEach(function(lote){
    var btn=document.createElement('button');
    btn.type='button';
    btn.className='chip'+(sel.includes(lote)?' sel':'');
    // Mostrar só o número da massa
    var partes=lote.split('-');
    btn.textContent=partes[1]||lote;
    btn.title=lote;
    btn.onclick=function(){toggleChip(fid,lote,btn);};
    cont.appendChild(btn);
  });
  atualizarTextoSel(fid);
}

function toggleChip(fid,lote,btn){
  var sel=fotosData[fid].lotesSel;
  var idx=sel.indexOf(lote);
  if(idx>=0){ sel.splice(idx,1); btn.classList.remove('sel'); }
  else { sel.push(lote); btn.classList.add('sel'); }
  atualizarTextoSel(fid);
}

function atualizarTextoSel(fid){
  var sel=fotosData[fid]?fotosData[fid].lotesSel:[];
  var el=document.getElementById('sel'+fid);
  if(!el) return;
  if(sel.length===0){ el.textContent='Nenhuma massa selecionada'; }
  else { el.textContent=sel.join(' / '); }
}

window.carregarFoto=function(input,fid){
  var file=input.files[0];
  if(!file) return;
  var reader=new FileReader();
  reader.onload=function(e){
    fotosData[fid].base64=e.target.result;
    var img=document.getElementById('fimg'+fid);
    img.src=e.target.result; img.style.display='block';
    var area=document.getElementById('fa'+fid);
    area.classList.add('tem-foto');
    area.querySelector('p').textContent='✔ Foto carregada';
    area.querySelector('.fi').textContent='✅';
    atualizarResumoFotos();
  };
  reader.readAsDataURL(file);
};

function atualizarResumoFotos(){
  var total=Object.keys(fotosData).length;
  var comFoto=Object.values(fotosData).filter(function(f){return f.base64;}).length;
  document.getElementById('resumo-fotos').textContent=comFoto+'/'+total+' fotos';
}

window.gerarPDF=function(){

  var doc=new jsPDF({orientation:'portrait',unit:'mm',format:'a4'});

  try{ doc.addImage('data:image/png;base64,'+LOGO,'PNG',ML,2,18,18); }catch(e){}

  doc.text('Panificadora e Confeitaria La Casa Di Pão Ltda.  |  CNPJ: 68.812.312/0001-33  |  (41) 99961-4714',ML+22,15);
  doc.text('Rev. 00',W-MR,15,{align:'right'});
  y=28;

  // IDENTIFICAÇÃO
  var nomeProduto=PRODUTOS[produto]||produto;
  doc.setFillColor.apply(doc,azul); doc.rect(ML,y,CW,8,'F');
  doc.setFont('helvetica','bold'); doc.setFontSize(11); doc.setTextColor(255,255,255);
  doc.text(nomeProduto.toUpperCase()+' — LAUDO DE QUALIDADE',ML+3,y+5.5);
  y+=10;
  var campos=[
    ['Produto',nomeProduto],['Código / SKU',produto],

    ['Total de massas',lotes.length+' massas'],
    ['Endereço','Rua Rev. José Ferreira Filho, 110 - Novo Mundo, Curitiba PR - CEP 81050-422'],
  ];
  campos.forEach(function(row,i){
    doc.setFillColor.apply(doc,i%2===0?cinzaL:branco);
    doc.rect(ML,y,CW,7,'F'); doc.rect(ML,y,CW,7,'S');
    doc.setFont('helvetica','bold'); doc.setFontSize(9); doc.setTextColor(50,50,50);
    doc.text(row[0]+':',ML+2,y+4.8);
    doc.setFont('helvetica','normal'); doc.setTextColor(0,0,0);
    doc.text(String(row[1]),ML+60,y+4.8);
    y+=7;
  });
  y+=6;

  // LEGENDA QC
  checkY(18);
  doc.setFillColor.apply(doc,azulL); doc.rect(ML,y,CW,16,'F'); doc.rect(ML,y,CW,16,'S');
  doc.setFont('helvetica','bold'); doc.setFontSize(9); doc.setTextColor.apply(doc,azul);
  doc.text('Critérios de Avaliação de Qualidade',ML+3,y+5);
  doc.setFont('helvetica','normal'); doc.setFontSize(8); doc.setTextColor.apply(doc,cinza);
  doc.text('Notas de 0 a 100 (múltiplos de 5)  |  Total máximo: 300 pts  |  Aprovado: ≥ 201 pts',ML+3,y+9.5);
  doc.text('Volume: desenvolvimento da massa  |  Crocância: textura da casca  |  Pestana: abertura lateral',ML+3,y+13.5);
  y+=20;

  // MASSAS
  lotes.forEach(function(lote,idx){
    var d=massasData[lote]||{};
    var v=d.v||0,c=d.c||0,p=d.p||0,total=v+c+p;
    var temNotas=v>0||c>0||p>0;
    checkY(36);
    // Header
    doc.setFillColor.apply(doc,azul); doc.rect(ML,y,CW,8,'F');
    doc.setFont('helvetica','bold'); doc.setFontSize(10); doc.setTextColor(255,255,255);
    doc.text(lote,ML+3,y+5.5);
    doc.setFont('helvetica','normal'); doc.setFontSize(9);
    doc.text('Massa '+(idx+1)+'/'+lotes.length,W-MR,y+5.5,{align:'right'});
    y+=8;
    // Corpo
    var bodyY=y;
    doc.setFillColor(255,255,255); doc.rect(ML,y,CW,22,'F'); doc.rect(ML,y,CW,22,'S');
    var colW=CW/4;
    var qcL=['Volume','Crocância','Pestana','Total'];
    var qcV=[temNotas?String(v):'—',temNotas?String(c):'—',temNotas?String(p):'—',temNotas?String(total)+' pts':'—'];
    qcL.forEach(function(lb,i){
      var cx=ML+i*colW, isT=i===3;
      if(isT){doc.setFillColor.apply(doc,azulL);doc.rect(cx,bodyY,colW,22,'F');}
      doc.setFont('helvetica','bold'); doc.setFontSize(8);

      doc.text(lb,cx+colW/2,bodyY+6,{align:'center'});

      doc.setTextColor.apply(doc,isT?azul:[0,0,0]);
      doc.text(qcV[i],cx+colW/2,bodyY+16,{align:'center'});

    // Status
    doc.setFillColor.apply(doc,verdeL); doc.rect(ML,bodyY+22,CW,8,'F'); doc.rect(ML,bodyY+22,CW,8,'S');
    doc.setFont('helvetica','bold'); doc.setFontSize(9); doc.setTextColor.apply(doc,verde);
    doc.text('✔  APROVADO',W/2,bodyY+27,{align:'center'});
    y+=32;
  });

  y+=6;

  // FOTOS
  var fids=Object.keys(fotosData);
  if(fids.length>0){
    checkY(12);
    doc.setFillColor.apply(doc,azul); doc.rect(ML,y,CW,8,'F');
    doc.setFont('helvetica','bold'); doc.setFontSize(10); doc.setTextColor(255,255,255);
    doc.text('REGISTRO FOTOGRÁFICO DAS FORNADAS',ML+3,y+5.5);

      var hBloco=temFoto?62:20;
      checkY(hBloco+4);
      // Header foto
      doc.setFillColor.apply(doc,azulL); doc.rect(ML,y,CW,7,'F'); doc.rect(ML,y,CW,7,'S');
      doc.setFont('helvetica','bold'); doc.setFontSize(9); doc.setTextColor.apply(doc,azul);

      if(fd.lotesSel&&fd.lotesSel.length>0){

      y+=7;

          doc.addImage(fd.base64,'JPEG',ML,y,CW,50,'','FAST');

        }catch(e){y+=4;}

        doc.setFillColor(240,244,248); doc.rect(ML,y,CW,14,'F'); doc.rect(ML,y,CW,14,'S');

        doc.text('[Foto não inserida]',W/2,y+8,{align:'center'});
        y+=16;
      }
    });
    y+=6;
  }

  // PARÂMETROS MICROBIOLÓGICOS
  checkY(52);
  doc.setFillColor.apply(doc,azul); doc.rect(ML,y,CW,8,'F');
  doc.setFont('helvetica','bold'); doc.setFontSize(10); doc.setTextColor(255,255,255);
  doc.text('PARÂMETROS MICROBIOLÓGICOS',ML+3,y+5.5);
  y+=10;

  doc.text('Micro-organismo',ML+2,y+4.8);
  doc.text('Limite Permitido',ML+mW[0]+2,y+4.8);
  doc.text('Resultado do Ensaio',ML+mW[0]+mW[1]+2,y+4.8);

    doc.setFillColor.apply(doc,i%2===0?cinzaL:branco);

  y+=12;

  // DECLARAÇÃO
  checkY(20);

  doc.text(doc.splitTextToSize(decl,CW-4),ML+2,y+4.5);
  y+=18;

  // ASSINATURA — sem RT
  checkY(22);
  doc.setFont('helvetica','normal'); doc.setFontSize(9); doc.setTextColor.apply(doc,cinza);

  var totalPages=doc.getNumberOfPages();

  pdfBlob=doc.output('blob');
  var nomeArq='Laudo_'+produto+'_'+dataFab+'.pdf';

  document.getElementById('btn-dl').onclick=function(){
    var url=URL.createObjectURL(pdfBlob);

    window.open('https://wa.me/?text='+txt,'_blank');
    setTimeout(function(){
      var url=URL.createObjectURL(pdfBlob);
      var a=document.createElement('a'); a.href=url; a.download=nomeArq; a.click();
      URL.revokeObjectURL(url);

  document.getElementById('modal').classList.add('open');
};
